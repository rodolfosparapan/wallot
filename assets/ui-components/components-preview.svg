<svg width="400" height="500" viewBox="0 0 400 500" xmlns="http://www.w3.org/2000/svg">
  <rect width="400" height="500" fill="#041208"/>
  <text x="20" y="30" font-family="Helvetica Neue,Arial,sans-serif" font-weight="700" font-size="13" fill="#4ade80">UI COMPONENTS</text>

  <!-- Balance card -->
  <rect x="20" y="48" width="360" height="80" rx="14" fill="#0a4d1c" stroke="#16a34a" stroke-width="1.5"/>
  <text x="36" y="72" font-family="Helvetica Neue,Arial,sans-serif" font-size="10" fill="#86efac">AVAILABLE BALANCE</text>
  <text x="36" y="100" font-family="Helvetica Neue,Arial,sans-serif" font-weight="800" font-size="32" fill="#ffffff">R$ 4.820,00</text>
  <text x="36" y="118" font-family="Helvetica Neue,Arial,sans-serif" font-size="11" fill="#22c55e">+12% vs last month</text>

  <!-- Stat cards -->
  <rect x="20" y="144" width="170" height="60" rx="10" fill="#0a1f0e" stroke="#0f3d15" stroke-width="1"/>
  <text x="36" y="164" font-family="Helvetica Neue,Arial,sans-serif" font-size="9" fill="#4ade80">INCOME</text>
  <text x="36" y="188" font-family="Helvetica Neue,Arial,sans-serif" font-weight="700" font-size="18" fill="#22c55e">R$ 6.500</text>
  <rect x="210" y="144" width="170" height="60" rx="10" fill="#0a1f0e" stroke="#0f3d15" stroke-width="1"/>
  <text x="226" y="164" font-family="Helvetica Neue,Arial,sans-serif" font-size="9" fill="#4ade80">EXPENSES</text>
  <text x="226" y="188" font-family="Helvetica Neue,Arial,sans-serif" font-weight="700" font-size="18" fill="#f87171">R$ 1.680</text>

  <!-- Primary button -->
  <rect x="20" y="222" width="360" height="48" rx="12" fill="#22c55e"/>
  <text x="200" y="251" font-family="Helvetica Neue,Arial,sans-serif" font-weight="700" font-size="15" fill="#041208" text-anchor="middle">Save entry</text>

  <!-- Ghost button -->
  <rect x="20" y="282" width="170" height="44" rx="10" fill="none" stroke="#0f5c22" stroke-width="1.5"/>
  <text x="105" y="309" font-family="Helvetica Neue,Arial,sans-serif" font-weight="600" font-size="13" fill="#86efac" text-anchor="middle">Cancel</text>
  <rect x="210" y="282" width="170" height="44" rx="10" fill="none" stroke="#7f1d1d" stroke-width="1.5"/>
  <text x="295" y="309" font-family="Helvetica Neue,Arial,sans-serif" font-weight="600" font-size="13" fill="#f87171" text-anchor="middle">Delete</text>

  <!-- Input field -->
  <rect x="20" y="344" width="360" height="44" rx="10" fill="#0a1f0e" stroke="#0f5c22" stroke-width="1"/>
  <text x="36" y="370" font-family="Helvetica Neue,Arial,sans-serif" font-size="13" fill="#4ade80">Email address</text>

  <!-- Category pills -->
  <rect x="20" y="406" width="76" height="28" rx="14" fill="#22c55e"/>
  <text x="58" y="424" font-family="Helvetica Neue,Arial,sans-serif" font-weight="700" font-size="11" fill="#041208" text-anchor="middle">Food</text>
  <rect x="104" y="406" width="90" height="28" rx="14" fill="#0a1f0e" stroke="#0f5c22" stroke-width="1"/>
  <text x="149" y="424" font-family="Helvetica Neue,Arial,sans-serif" font-size="11" fill="#86efac" text-anchor="middle">Housing</text>
  <rect x="202" y="406" width="100" height="28" rx="14" fill="#0a1f0e" stroke="#0f5c22" stroke-width="1"/>
  <text x="252" y="424" font-family="Helvetica Neue,Arial,sans-serif" font-size="11" fill="#86efac" text-anchor="middle">Transport</text>
  <rect x="310" y="406" width="72" height="28" rx="14" fill="#0a1f0e" stroke="#0f5c22" stroke-width="1"/>
  <text x="346" y="424" font-family="Helvetica Neue,Arial,sans-serif" font-size="11" fill="#86efac" text-anchor="middle">Health</text>

  <!-- Toggle -->
  <text x="20" y="466" font-family="Helvetica Neue,Arial,sans-serif" font-size="12" fill="#d1fae5">Weekly AI summary</text>
  <rect x="330" y="452" width="44" height="24" rx="12" fill="#22c55e"/>
  <circle cx="362" cy="464" r="10" fill="#ffffff"/>
  <text x="20" y="496" font-family="Helvetica Neue,Arial,sans-serif" font-size="12" fill="#d1fae5">Monthly report</text>
  <rect x="330" y="482" width="44" height="24" rx="12" fill="#0f3d15"/>
  <circle cx="342" cy="494" r="10" fill="#ffffff"/>
</svg>