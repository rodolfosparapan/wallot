<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wallot — Login</title>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@400;500;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --green:       #22c55e;
    --green-deep:  #14532d;
    --green-dark:  #166534;
    --green-mid:   #16a34a;
    --green-light: #dcfce7;
    --white:       #ffffff;
    --bg:          #f7f9f8;
    --text:        #111917;
    --text-mid:    #3d6b52;
    --text-muted:  #7a9e8a;
    --text-dim:    #b0caba;
    --red:         #ef4444;
    --border:      rgba(0,0,0,0.07);
    --shadow-sm:   0 1px 4px rgba(0,0,0,0.05), 0 2px 8px rgba(0,0,0,0.04);
    --shadow-green:0 8px 32px rgba(20,83,45,0.28);
  }

  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    background:#dde8e1;
    display:flex; align-items:center; justify-content:center;
    min-height:100vh;
    font-family:'Bricolage Grotesque', sans-serif;
  }

  .phone {
    width:393px; height:852px;
    background:var(--bg);
    border-radius:52px;
    border:10px solid #111;
    box-shadow:0 0 0 1.5px #2a2a2a, 0 50px 100px rgba(0,0,0,0.28), inset 0 0 0 1px rgba(255,255,255,0.9);
    position:relative; overflow:hidden;
  }
  .phone::before {
    content:''; position:absolute; left:-13px; top:120px;
    width:4px; height:32px; background:#111; border-radius:2px 0 0 2px;
    box-shadow:0 44px 0 #111, 0 88px 0 #111;
  }
  .phone::after {
    content:''; position:absolute; right:-13px; top:150px;
    width:4px; height:60px; background:#111; border-radius:0 2px 2px 0;
  }

  .screen {
    position:absolute; inset:0;
    display:flex; flex-direction:column;
    overflow:hidden;
  }

  .island {
    width:120px; height:34px; background:#0a0a0a;
    border-radius:20px; margin:14px auto 0; flex-shrink:0; z-index:10;
  }

  /* STATUS */
  .status {
    display:flex; justify-content:space-between; align-items:center;
    padding:8px 28px 0; flex-shrink:0;
    font-family:'DM Mono', monospace; font-size:12px; font-weight:500; color:var(--text);
  }
  .status-icons { display:flex; gap:6px; align-items:center; }

  /* HERO TOP */
  .hero {
    background:linear-gradient(160deg, var(--green-deep) 0%, #1a5e35 60%, #0f3d22 100%);
    padding:24px 28px 36px; flex-shrink:0; position:relative; overflow:hidden;
  }
  .hero::before {
    content:''; position:absolute; top:-60px; right:-50px;
    width:200px; height:200px;
    background:radial-gradient(circle, rgba(74,222,128,0.2) 0%, transparent 65%);
    pointer-events:none;
  }
  .hero::after {
    content:''; position:absolute; bottom:-30px; left:-20px;
    width:140px; height:140px;
    background:radial-gradient(circle, rgba(34,197,94,0.1) 0%, transparent 65%);
    pointer-events:none;
  }

  .hero-logo {
    display:flex; align-items:center; gap:10px;
    margin-bottom:20px; position:relative; z-index:1;
  }
  .hero-logo-mark {
    width:36px; height:36px; border-radius:12px;
    background:rgba(255,255,255,0.12); border:1px solid rgba(255,255,255,0.15);
    display:flex; align-items:center; justify-content:center;
  }
  .hero-logo-mark svg { width:20px; height:20px; }
  .hero-logo-name { font-size:20px; font-weight:800; color:#fff; letter-spacing:-0.5px; }

  .hero-title { font-size:26px; font-weight:800; color:#fff; line-height:1.2; margin-bottom:6px; position:relative; z-index:1; }
  .hero-sub   { font-size:13px; color:rgba(187,247,208,0.6); font-weight:500; position:relative; z-index:1; }

  /* TAB BAR */
  .tab-wrap { padding:20px 18px 0; flex-shrink:0; }
  .tab-bar {
    display:grid; grid-template-columns:1fr 1fr;
    background:var(--white); border:1px solid var(--border);
    border-radius:18px; padding:4px;
    box-shadow:var(--shadow-sm);
  }
  .tab {
    padding:10px; border-radius:14px;
    font-size:13px; font-weight:700; text-align:center;
    cursor:pointer; color:var(--text-muted); transition:all 0.2s;
  }
  .tab.active { background:var(--green-deep); color:#fff; box-shadow:0 2px 8px rgba(20,83,45,0.25); }

  /* FORM */
  .form-wrap {
    flex:1; overflow-y:auto; padding:20px 18px 24px;
    scrollbar-width:none;
  }
  .form-wrap::-webkit-scrollbar { display:none; }

  .field { margin-bottom:12px; }
  .field-label {
    font-size:11px; font-weight:700; color:var(--text-muted);
    text-transform:uppercase; letter-spacing:0.07em;
    margin-bottom:6px; padding-left:2px;
  }
  .field-input-wrap {
    background:var(--white); border:1px solid var(--border);
    border-radius:16px; padding:13px 16px;
    display:flex; align-items:center; gap:10px;
    box-shadow:var(--shadow-sm);
    transition:border-color 0.2s;
  }
  .field-input-wrap:focus-within { border-color:rgba(34,197,94,0.4); }
  .field-input-wrap svg { width:17px; height:17px; color:var(--text-dim); flex-shrink:0; }
  .field-input-wrap input {
    border:none; outline:none; background:transparent;
    font-family:'Bricolage Grotesque', sans-serif;
    font-size:14px; color:var(--text); width:100%;
  }
  .field-input-wrap input::placeholder { color:var(--text-dim); }

  .forgot {
    text-align:right; margin-top:6px;
    font-size:12px; color:var(--green-mid); font-weight:600; cursor:pointer;
  }

  /* Primary button */
  .btn-primary {
    width:100%; padding:16px; border-radius:18px;
    background:var(--green-deep); color:#fff;
    border:none; font-family:'Bricolage Grotesque', sans-serif;
    font-size:15px; font-weight:800; cursor:pointer;
    box-shadow:var(--shadow-green);
    display:flex; align-items:center; justify-content:center; gap:8px;
    margin-top:20px; margin-bottom:16px;
    transition:transform 0.15s;
  }
  .btn-primary:hover { transform:translateY(-1px); }

  /* Divider */
  .or-divider {
    display:flex; align-items:center; gap:12px; margin-bottom:16px;
  }
  .or-line { flex:1; height:1px; background:var(--border); }
  .or-text  { font-size:12px; color:var(--text-dim); font-weight:600; }

  /* Social buttons */
  .social-btns { display:flex; flex-direction:column; gap:10px; }
  .social-btn {
    width:100%; padding:14px; border-radius:16px;
    background:var(--white); border:1px solid var(--border);
    font-family:'Bricolage Grotesque', sans-serif;
    font-size:14px; font-weight:700; color:var(--text);
    cursor:pointer; display:flex; align-items:center; justify-content:center; gap:10px;
    box-shadow:var(--shadow-sm); transition:box-shadow 0.2s;
  }
  .social-btn:hover { box-shadow:0 4px 16px rgba(0,0,0,0.1); }
  .social-btn svg { width:20px; height:20px; flex-shrink:0; }

  /* Terms */
  .terms {
    text-align:center; margin-top:20px;
    font-size:11px; color:var(--text-dim); line-height:1.6;
  }
  .terms a { color:var(--green-mid); font-weight:600; text-decoration:none; }

  /* Register extra field */
  .register-only { display:none; }
</style>
</head>
<body>
<div class="phone">
 <div class="screen">
  <div class="island"></div>

  <!-- Status -->
  <div class="status">
    <span>9:41</span>
    <div class="status-icons">
      <svg width="17" height="12" viewBox="0 0 17 12" fill="none">
        <rect x="0" y="4" width="3" height="8" rx="1.5" fill="#111917"/>
        <rect x="4.5" y="2.5" width="3" height="9.5" rx="1.5" fill="#111917"/>
        <rect x="9" y="0.5" width="3" height="11.5" rx="1.5" fill="#22c55e"/>
        <rect x="13.5" y="0.5" width="3" height="11.5" rx="1.5" fill="rgba(17,25,23,0.2)"/>
      </svg>
      <svg width="16" height="12" viewBox="0 0 16 12" fill="none">
        <path d="M8 2C10.5 2 12.7 3.1 14.2 4.8L15.5 3.5C13.6 1.4 11 0 8 0C5 0 2.4 1.4 0.5 3.5L1.8 4.8C3.3 3.1 5.5 2 8 2Z" fill="#111917"/>
        <path d="M8 5C9.7 5 11.2 5.8 12.2 7L13.5 5.8C12.1 4.2 10.2 3.2 8 3.2C5.8 3.2 3.9 4.2 2.5 5.8L3.8 7C4.8 5.8 6.3 5 8 5Z" fill="#111917"/>
        <circle cx="8" cy="10" r="1.8" fill="#22c55e"/>
      </svg>
      <svg width="28" height="13" viewBox="0 0 28 13" fill="none">
        <rect x="0.5" y="0.5" width="23" height="12" rx="3.5" stroke="#111917" stroke-opacity="0.3"/>
        <rect x="2" y="2" width="18" height="9" rx="2" fill="#111917"/>
        <path d="M25 4.5V8.5C26 8.2 26.8 7.2 26.8 6.5C26.8 5.8 26 4.8 25 4.5Z" fill="#111917" fill-opacity="0.4"/>
      </svg>
    </div>
  </div>

  <!-- Hero -->
  <div class="hero">
    <div class="hero-logo">
      <div class="hero-logo-mark">
        <svg viewBox="0 0 24 24" fill="none" stroke="#22c55e" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6l5 12 4-9 4 9 5-12"/></svg>
      </div>
      <div class="hero-logo-name">wallot</div>
    </div>
    <div class="hero-title" id="hero-title">Welcome back! 👋</div>
    <div class="hero-sub" id="hero-sub">Sign in to your account to continue</div>
  </div>

  <!-- Tab bar -->
  <div class="tab-wrap">
    <div class="tab-bar">
      <div class="tab active" id="tab-login" onclick="switchTab('login')">Sign in</div>
      <div class="tab" id="tab-register" onclick="switchTab('register')">Create account</div>
    </div>
  </div>

  <!-- Form -->
  <div class="form-wrap">

    <!-- Name (register only) -->
    <div class="field register-only" id="field-name">
      <div class="field-label">Full name</div>
      <div class="field-input-wrap">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>
        <input type="text" placeholder="Jonathan Silva"/>
      </div>
    </div>

    <!-- Email -->
    <div class="field">
      <div class="field-label">Email</div>
      <div class="field-input-wrap">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
        <input type="email" placeholder="your@email.com"/>
      </div>
    </div>

    <!-- Password -->
    <div class="field">
      <div class="field-label">Password</div>
      <div class="field-input-wrap">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
        <input type="password" placeholder="••••••••"/>
      </div>
      <div class="forgot" id="forgot-link">Forgot password?</div>
    </div>

    <!-- Primary CTA -->
    <button class="btn-primary" id="btn-cta">
      <span id="btn-label">Sign in</span>
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
    </button>

    <!-- Social divider -->
    <div class="or-divider">
      <div class="or-line"></div>
      <div class="or-text">or continue with</div>
      <div class="or-line"></div>
    </div>

    <!-- Social buttons -->
    <div class="social-btns">
      <button class="social-btn">
        <!-- Google -->
        <svg viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
        Continue with Google
      </button>

      <button class="social-btn">
        <!-- Apple -->
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M18.71 19.5c-.83 1.24-1.71 2.45-3.05 2.47-1.34.03-1.77-.79-3.29-.79-1.53 0-2 .77-3.27.82-1.31.05-2.3-1.32-3.14-2.53C4.25 17 2.94 12.45 4.7 9.39c.87-1.52 2.43-2.48 4.12-2.51 1.28-.02 2.5.87 3.29.87.78 0 2.26-1.07 3.8-.91.65.03 2.47.26 3.64 1.98-.09.06-2.17 1.28-2.15 3.81.03 3.02 2.65 4.03 2.68 4.04-.03.07-.42 1.44-1.38 2.83M13 3.5c.73-.83 1.94-1.46 2.94-1.5.13 1.17-.34 2.35-1.04 3.19-.69.85-1.83 1.51-2.95 1.42-.15-1.15.41-2.35 1.05-3.11z"/></svg>
        Continue with Apple
      </button>
    </div>

    <div class="terms">
      By continuing you agree to our <a href="#">Terms</a> and <a href="#">Privacy Policy</a>
    </div>

  </div>

 </div>
</div>

<script>
  function switchTab(tab) {
    const isLogin = tab === 'login';
    document.getElementById('tab-login').className    = 'tab' + (isLogin ? ' active' : '');
    document.getElementById('tab-register').className = 'tab' + (!isLogin ? ' active' : '');
    document.getElementById('hero-title').textContent = isLogin ? 'Welcome back! 👋' : 'Create your account ✨';
    document.getElementById('hero-sub').textContent   = isLogin ? 'Sign in to your account to continue' : 'Start tracking smarter today';
    document.getElementById('btn-label').textContent  = isLogin ? 'Sign in' : 'Create account';
    document.getElementById('forgot-link').style.display = isLogin ? 'block' : 'none';
    document.querySelectorAll('.register-only').forEach(el => {
      el.style.display = isLogin ? 'none' : 'block';
    });
  }
</script>
</body>
</html>
