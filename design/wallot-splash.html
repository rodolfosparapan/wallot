<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wallot — Splash</title>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@400;500;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --green:      #22c55e;
    --green-deep: #14532d;
    --green-dark: #166534;
    --green-mid:  #16a34a;
    --white:      #ffffff;
  }

  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    background:#dde8e1;
    display:flex; align-items:center; justify-content:center;
    min-height:100vh;
    font-family:'Bricolage Grotesque', sans-serif;
  }

  .phone {
    width:393px; height:852px;
    background:var(--green-deep);
    border-radius:52px;
    border:10px solid #111;
    box-shadow:0 0 0 1.5px #2a2a2a, 0 50px 100px rgba(0,0,0,0.28), inset 0 0 0 1px rgba(255,255,255,0.9);
    position:relative; overflow:hidden;
  }
  .phone::before {
    content:''; position:absolute; left:-13px; top:120px;
    width:4px; height:32px; background:#111; border-radius:2px 0 0 2px;
    box-shadow:0 44px 0 #111, 0 88px 0 #111;
  }
  .phone::after {
    content:''; position:absolute; right:-13px; top:150px;
    width:4px; height:60px; background:#111; border-radius:0 2px 2px 0;
  }

  /* Background orbs */
  .orb1 {
    position:absolute; top:-80px; right:-80px;
    width:320px; height:320px; border-radius:50%;
    background:radial-gradient(circle, rgba(74,222,128,0.25) 0%, transparent 65%);
    pointer-events:none;
  }
  .orb2 {
    position:absolute; bottom:-60px; left:-60px;
    width:260px; height:260px; border-radius:50%;
    background:radial-gradient(circle, rgba(34,197,94,0.15) 0%, transparent 65%);
    pointer-events:none;
  }
  .orb3 {
    position:absolute; top:40%; left:50%; transform:translate(-50%,-50%);
    width:400px; height:400px; border-radius:50%;
    background:radial-gradient(circle, rgba(74,222,128,0.08) 0%, transparent 65%);
    pointer-events:none;
  }

  /* Subtle grid pattern */
  .grid-pattern {
    position:absolute; inset:0;
    background-image:
      linear-gradient(rgba(74,222,128,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(74,222,128,0.04) 1px, transparent 1px);
    background-size:32px 32px;
    pointer-events:none;
  }

  .island {
    width:120px; height:34px; background:#0a0a0a;
    border-radius:20px; margin:14px auto 0;
    position:relative; z-index:10;
  }

  .screen {
    position:absolute; inset:0;
    display:flex; flex-direction:column;
    align-items:center; justify-content:center;
    padding:40px 32px;
  }

  /* Logo mark */
  .logo-wrap {
    display:flex; flex-direction:column; align-items:center;
    gap:20px; margin-bottom:40px;
    animation:logoIn 0.8s cubic-bezier(0.34,1.56,0.64,1) both;
  }

  @keyframes logoIn {
    from { opacity:0; transform:scale(0.7) translateY(20px); }
    to   { opacity:1; transform:scale(1) translateY(0); }
  }

  .logo-mark {
    width:88px; height:88px; border-radius:28px;
    background:linear-gradient(145deg, rgba(255,255,255,0.15), rgba(255,255,255,0.05));
    border:1.5px solid rgba(255,255,255,0.15);
    display:flex; align-items:center; justify-content:center;
    box-shadow:
      0 0 0 12px rgba(34,197,94,0.06),
      0 0 0 24px rgba(34,197,94,0.03),
      0 20px 40px rgba(0,0,0,0.3);
    position:relative;
  }

  /* W lettermark */
  .logo-mark svg { width:48px; height:48px; }

  .logo-name {
    font-size:38px; font-weight:800; color:#fff;
    letter-spacing:-1.5px;
    text-shadow:0 2px 20px rgba(0,0,0,0.2);
  }

  .logo-tagline {
    font-size:14px; color:rgba(187,247,208,0.6);
    font-weight:500; text-align:center;
    letter-spacing:0.02em; line-height:1.5;
    animation:fadeUp 0.6s 0.4s ease both;
  }

  @keyframes fadeUp {
    from { opacity:0; transform:translateY(10px); }
    to   { opacity:1; transform:translateY(0); }
  }

  /* Loading bar */
  .loading-wrap {
    position:absolute; bottom:80px; left:32px; right:32px;
    animation:fadeUp 0.5s 0.6s ease both;
  }

  .loading-track {
    height:3px; background:rgba(255,255,255,0.1);
    border-radius:2px; overflow:hidden;
  }

  .loading-fill {
    height:100%; border-radius:2px;
    background:linear-gradient(to right, rgba(34,197,94,0.5), #22c55e);
    animation:load 2s ease-in-out infinite;
  }

  @keyframes load {
    0%   { width:0%; margin-left:0%; }
    50%  { width:60%; margin-left:20%; }
    100% { width:0%; margin-left:100%; }
  }

  .loading-text {
    text-align:center; margin-top:12px;
    font-size:11px; color:rgba(187,247,208,0.4);
    font-family:'DM Mono', monospace; letter-spacing:0.06em;
  }
</style>
</head>
<body>
<div class="phone">
  <div class="orb1"></div>
  <div class="orb2"></div>
  <div class="orb3"></div>
  <div class="grid-pattern"></div>
  <div class="island"></div>

  <div class="screen">
    <div class="logo-wrap">
      <div class="logo-mark">
        <!-- W lettermark -->
        <svg viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M6 12L14 36L24 18L34 36L42 12" stroke="#22c55e" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <div class="logo-name">wallot</div>
      <div class="logo-tagline">Your wallet, a lot smarter.</div>
    </div>
  </div>

  <div class="loading-wrap">
    <div class="loading-track">
      <div class="loading-fill"></div>
    </div>
    <div class="loading-text">Loading your finances…</div>
  </div>

</div>
</body>
</html>
